<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#gradient)"/>
  
  <!-- Paw print -->
  <!-- Main pad -->
  <ellipse cx="50" cy="60" rx="16" ry="20" fill="white"/>
  
  <!-- Top left toe -->
  <ellipse cx="30" cy="35" rx="8" ry="12" fill="white" transform="rotate(-20 30 35)"/>
  
  <!-- Top middle toe -->
  <ellipse cx="50" cy="30" rx="8" ry="12" fill="white"/>
  
  <!-- Top right toe -->
  <ellipse cx="70" cy="35" rx="8" ry="12" fill="white" transform="rotate(20 70 35)"/>
  
  <!-- Bottom toe -->
  <ellipse cx="50" cy="50" rx="7" ry="10" fill="white"/>
</svg>
